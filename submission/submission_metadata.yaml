# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/sudo-verse/redrob_Ranker.git"
# Push the contents of this package as the repo root. Keep it public for judging.

reproduce_command: "python rank_v2.py --candidates ./candidates.jsonl --out ./submission.csv"
# Single command, end-to-end. Cold run ~53s (embedding pre-compute ~40s, cached
# thereafter); the ranking step that writes the CSV is ~18s — well under 5 min.
# V1-only (no embeddings) alternative: python rank.py --candidates ./candidates.jsonl --out ./submission.csv
# The portal expects XLSX; convert the CSV before upload:
#   python make_xlsx.py --in ./submission.csv --out ./submission.xlsx

# ============================================================================
# Compute environment (actual machine used)
# ============================================================================
compute:
  platform: "Local Linux workstation"
  cpu_cores: 12
  ram_gb: 15
  python_version: "3.13.13"        # code is 3.11+ compatible; tested on 3.13
  os: "Fedora Linux 44 (Workstation Edition)"
  uses_gpu_for_inference: false    # CPU only, as required
  has_network_during_ranking: false  # no API calls during ranking
  pre_computation_required: true   # V2 precomputes candidate embeddings (cached)
  pre_computation_time_minutes: 1  # ~40s to embed 100k docs on CPU; cached after

# ============================================================================
# AI tools declaration (transparency — declared use is not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"        # data analysis, architecture, implementation, review

ai_usage_summary: |
  We used an AI coding assistant during development for data exploration,
  refactoring help, and writing tests. The ranker itself makes no model or network
  calls at run time: scoring is a fixed weighted rule engine and the reasons are
  built from each profile's own fields. No candidate data is sent to any external
  service during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  The ranker is a weighted rule engine over 8 features (title fit, IR skill depth,
  product-company experience, availability, assessment-backed trust, location,
  experience range, GitHub). Before scoring, profiles with internal contradictions
  (impossible job length, expert-with-0-months, work history far exceeding stated
  experience) are filtered out. An optional semantic matching step uses sentence
  embeddings to find candidates whose fit shows up in their descriptions and gives
  a small capped boost (~7%), so the rules stay in control. Weights are set by hand
  from what we learned about the data, since the dataset ships no labels. The
  reasons cite only facts from the profile. Runs in about 18s on CPU; the top 100
  contains no invalid profiles and passes the official checker.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true         # explicit honeypot vetoes; 0 in top-100
  reproduction_tested: true         # reproduce_command verified end-to-end